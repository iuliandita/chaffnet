name: container

on:
  pull_request:
    paths:
      - ".github/workflows/container.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "models/**"
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/container.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "models/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            cache: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            cache: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: chaffnet:ci
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=chaffnet-container-${{ matrix.cache }}
          cache-to: type=gha,mode=max,scope=chaffnet-container-${{ matrix.cache }}
      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --detach --name chaffnet-ci --publish 127.0.0.1:18080:8080 chaffnet:ci
          trap 'docker rm --force --volumes chaffnet-ci' EXIT
          for _ in {1..30}; do
            health_state=$(docker inspect --format '{{.State.Health.Status}}' chaffnet-ci)
            if [ "$health_state" = healthy ]; then
              break
            fi
            sleep 1
          done
          test "$(docker inspect --format '{{.State.Health.Status}}' chaffnet-ci)" = healthy
          test "$(docker inspect --format '{{.Config.User}}' chaffnet-ci)" = 65532:65532
          curl --fail --silent --show-error http://127.0.0.1:18080/healthz
          curl --fail --silent --show-error \
            --header 'content-type: application/json' \
            --data '{"text":"specific human note","context":"comment"}' \
            http://127.0.0.1:18080/v1/check

  publish-platform:
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            cache: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            cache: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/iuliandita/chaffnet
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/iuliandita/chaffnet:build-${{ github.sha }}-${{ matrix.cache }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=chaffnet-container-${{ matrix.cache }}
          cache-to: type=gha,mode=max,scope=chaffnet-container-${{ matrix.cache }}
          provenance: mode=max
          sbom: true

  publish:
    if: github.event_name != 'pull_request'
    needs: publish-platform
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/iuliandita/chaffnet
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Create multi-architecture manifest
        env:
          IMAGE: ghcr.io/iuliandita/chaffnet
          TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=(--tag "$tag")
          done <<< "$TAGS"
          docker buildx imagetools create \
            "${tag_args[@]}" \
            --metadata-file image-metadata.json \
            "$IMAGE:build-$GITHUB_SHA-amd64" \
            "$IMAGE:build-$GITHUB_SHA-arm64"
          digest=$(jq -er '."containerimage.descriptor".digest' image-metadata.json)
          docker buildx imagetools inspect \
            "$IMAGE@$digest" \
            --format '{{json .Manifest}}' > manifest.json
          jq -e '
            ([.manifests[] | select(
              .platform.os == "linux" and .platform.architecture == "amd64"
            )] | length) == 1 and
            ([.manifests[] | select(
              .platform.os == "linux" and .platform.architecture == "arm64"
            )] | length) == 1
          ' manifest.json
          echo "Published $IMAGE@$digest"
